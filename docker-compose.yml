version: '3.8'

services:
  app:
    build: .
    container_name: motosmart_app
    ports:
      - "4000:3000"
    depends_on:
      - db
    environment:
      DB_HOST: db
      DB_USER: root
      DB_PASSWORD: root
      DB_NAME: motosmart
    restart: always

  db:
    image: mysql:8
    container_name: motosmart_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: motosmart
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql

volumes:
  db_data: